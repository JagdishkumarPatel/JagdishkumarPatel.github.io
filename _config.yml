# Site settings
title: "Jag Patel - Principal AI/ML Engineer"
description: "Portfolio showcasing AI/ML projects, MLOps systems, cloud expertise, and professional insights"
url: "https://jagdishkumarpatel.github.io"  # Replace with your GitHub username
baseurl: ""  # Leave empty if deploying to root, or "/repository-name" if subfolder

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  projects:
    output: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md

# Include
include:
  - _pages

# Sass
sass:
  style: compressed

# SEO and social
author: "Jag Patel"
twitter:
  username: jagdishkumarpatel  # Replace with your Twitter handle
social:
  name: Jag Patel
  links:
    - https://github.com/jagdishkumarpatel
    - https://linkedin.com/in/jagdishkumarpatel