name: AI Trends - Fetch News

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch AI news
        run: node scripts/fetch-news.js

      - name: Commit updated news feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/top-news.json
          git diff --staged --quiet || git commit -m "chore: update AI trends feed [skip ci]"
          git pull --rebase origin main
          git push
