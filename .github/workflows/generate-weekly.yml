name: Generate AI Weekly Blog Post

on:
  schedule:
    # Every Sunday at 10:00 UTC (after ai-news.yml has run overnight)
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly post
        run: node scripts/generate-weekly.js

      - name: Commit and push if new post was created
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publish/
          git diff --staged --quiet || git commit -m "content: AI weekly roundup $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
